<!DOCTYPE html>
<html>
<head>
<title>Crixp</title>

<style>
body {
  margin: 0;
  background: black;
  color: cyan;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Background canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* Sidebar */
.menu {
  position: absolute;
  left: 20px;
  top: 100px;
  z-index: 2;
}

.menu p {
  margin: 20px 0;
  cursor: pointer;
  transition: 0.2s;
}

.menu p:hover {
  color: white;
  transform: translateX(8px);
}

/* Center UI */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 2;
}

h1 {
  text-shadow: 0 0 10px cyan, 0 0 25px cyan;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
  width: 260px;
  text-align: center;
  box-shadow: 0 0 10px cyan;
  outline: none;
}

button {
  padding: 12px 20px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: cyan;
  color: black;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 0 15px cyan;
  transition: 0.2s;
}

button:hover {
  background: white;
  box-shadow: 0 0 30px cyan;
}

#output {
  margin-top: 12px;
  color: white;
  min-height: 20px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="menu">
  <p>🏠 Main</p>
  <p>❓ Help</p>
  <p>🔗 Invite</p>
  <p>📁 More</p>
</div>

<div class="center">
  <h1>Crixp</h1>

  <input id="inputBox" placeholder="Type something..."><br>
  <button onclick="sendMessage()">Send</button>

  <p id="output"></p>
  <p>⚡ Powered by VoidBrickz ⚡</p>
</div>

<script>
/* ===== STAR BACKGROUND ===== */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let stars = [];

for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "cyan";

  for (const s of stars) {
    s.y += 0.3;

    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();

/* ===== SEND FUNCTION ===== */
let sending = false;

async function sendMessage() {
  const input = document.getElementById("inputBox");
  const output = document.getElementById("output");
  const text = input.value.trim();

  if (!text) {
    output.innerText = "Enter Here";
    return;
  }

  if (sending) return;
  sending = true;

  output.innerText = "Sending...";

  try {
    const response = await fetch("https://purple-smoke-9eb7.antanasjuoska130.workers.dev/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text
      })
    });

    if (!response.ok) {
      throw new Error("Request failed");
    }

    output.innerText = "The process generally takes approximately 10–20 minutes.";
    input.value = "";

  } catch (error) {
    output.innerText = "Failed to submit.";
  }

  sending = false;
}
</script>

</body>
</html>
