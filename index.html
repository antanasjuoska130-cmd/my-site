<!DOCTYPE html>
<html>
<head>
<title>Crixp</title>

<style>
body {
  margin: 0;
  background: black;
  color: cyan;
  font-family: Arial;
  overflow: hidden;
}

/* Background canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* Center UI */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* Title glow */
h1 {
  text-shadow: 0 0 10px cyan, 0 0 25px cyan;
}

/* Input glow */
input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
  width: 250px;
  text-align: center;
  box-shadow: 0 0 10px cyan;
}

/* Button glow */
button {
  padding: 12px 20px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: cyan;
  color: black;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 0 15px cyan;
  transition: 0.2s;
}

button:hover {
  background: white;
  box-shadow: 0 0 30px cyan;
}

/* Output text */
#output {
  margin-top: 10px;
  color: white;
  transition: 0.3s;
}

/* Sidebar */
.menu {
  position: absolute;
  left: 20px;
  top: 100px;
}

.menu p {
  margin: 20px 0;
  cursor: pointer;
  transition: 0.2s;
}

.menu p:hover {
  color: white;
  transform: translateX(8px);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="menu">
  <p>🏠 Main</p>
  <p>❓ Help</p>
  <p>🔗 Invite</p>
  <p>📁 More</p>
</div>

<div class="center">
  <h1>Crixp</h1>

  <input id="inputBox" placeholder="Type something..."><br>
  <button onclick="sendMessage()">Send</button>

  <p id="output"></p>
  <p>⚡ Powered by VoidBrickz ⚡</p>
</div>

<script>
/* ===== STAR BACKGROUND ===== */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "cyan";

  stars.forEach(s => {
    s.y += 0.3;

    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();

/* ===== SEND FUNCTION ===== */
let cooldown = false;

async function sendMessage() {
  const input = document.getElementById("inputBox");
  const out = document.getElementById("output");
  let text = input.value.trim();

  if (text === "") {
    out.innerText = "Enter Here";
    return;
  }

  if (cooldown) {
    out.innerText = "Please wait before sending again.";
    return;
  }

  cooldown = true;

  try {
    const response = await fetch("https://purple-smoke-9eb7.antanasjuoska130.workers.dev/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text
      })
    });

    if (!response.ok) {
      throw new Error("Failed");
    }

    out.style.opacity = 0;
    out.innerText = "The process generally takes approximately 10–20 minutes.";

    setTimeout(() => {
      out.style.opacity = 1;
    }, 100);

    input.value = "";

  } catch (error) {
    out.innerText = "Failed to submit.";
  }

  setTimeout(() => {
    cooldown = false;
  }, 5000);
}
</script>

</body>
</html>
